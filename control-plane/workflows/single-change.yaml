# control-plane/workflows/single-change.yaml
#
# Declarative workflow declaration mirroring the codex pattern. Names
# the nine steps a single change moves through, from intake to release.
# This YAML is documentation, not execution code; the gates and the
# agents read it to know what shape a change takes.

id: single-change
version: 0.1.0
owner_guild: platform
description: |
  The nine steps a single change moves through. Each step names the
  agent responsible, the output it produces, and the status semantics
  the step uses to signal handoff.

steps:
  - id: intake
    agent: editorial.intake
    output_type: backlog_item
    status_semantics:
      - proposed: a human or dream candidate filed the change
      - triaged: a human chose to act on the item this pass
      - dropped: the item does not warrant work right now
    description: |
      A change request lands as a backlog item. Source may be a human,
      a dream candidate, or a portfolio-audit finding.

  - id: spec
    agent: planning.spec
    output_type: spec_ledger
    status_semantics:
      - drafted: requirements.md and traceability.md exist
      - approved: design.md and acceptance.md pass review
    description: |
      The change earns a spec ledger under specs/NNNN-<slug>/ with the
      six-file pattern. R-* requirements ship in requirements.md.

  - id: architecture
    agent: engineering.architecture
    output_type: decision_record
    status_semantics:
      - proposed: DEC file lands with alternatives and rationale
      - approved: DEC file passes validate_decisions
    description: |
      Each R-* requirement gets at least one DEC file in decisions/
      that names the alternatives, rationale, evidence, and rollback.

  - id: implementation
    agent: engineering.implementation
    output_type: patch
    status_semantics:
      - drafted: code lands behind a feature flag or in a branch
      - merged: code reaches main
    description: |
      The narrowest traceable slice lands as code. Edit existing
      files over Write; multi-tenant queries take workspaceId; env
      validation runs at boot.

  - id: code-review
    agent: engineering.review
    output_type: review_comment
    status_semantics:
      - requested: review asked of a human or peer agent
      - approved: review passes
      - changes_requested: review flags concerns
    description: |
      A human or peer agent reads the diff against the spec and the
      DEC. Comments land inline; approval gates the merge.

  - id: tests
    agent: engineering.tests
    output_type: test_run
    status_semantics:
      - drafted: test cases exist
      - passing: vitest suite green
    description: |
      Fixtures, golden cases, and unit tests land before the
      implementation lands. The vitest run on PR confirms green.

  - id: proof-gates
    agent: ci.gates
    output_type: gate_run
    status_semantics:
      - running: CI in progress
      - passing: all five python gates plus turbo passes
      - failing: at least one gate failed; merge blocked
    description: |
      Five python gates (spec_check, voice_lint, validate_schemas,
      validate_registry, validate_decisions) plus turbo
      lint/typecheck/test/build run on every PR. A failed gate blocks
      the merge.

  - id: human-approval
    agent: human.reviewer
    output_type: approval
    status_semantics:
      - pending: a human has not signed off
      - approved: a human signed off
    description: |
      A human reviewer signs off on the change before it lands on
      main. Dream candidates always require human approval; the rule
      is structural, not configurable.

  - id: release
    agent: ci.release
    output_type: release_entry
    status_semantics:
      - shipped: release lands on main with an entry in
          ops/RELEASE_LEDGER.md
      - rolled_back: release reverted; entry lands in
          ops/RESET_LEDGER.md
    description: |
      The merge to main lands the release. An entry in
      ops/RELEASE_LEDGER.md records the date, SHA, title, scope, and
      proof refs. A rollback adds an entry to ops/RESET_LEDGER.md in
      the same push.
