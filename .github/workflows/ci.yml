name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: gates (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install python deps
        run: python -m pip install --quiet "jsonschema>=4.21" "referencing>=0.35" "pyyaml>=6.0"
      - name: spec_check
        run: python scripts/spec_check.py
      - name: voice_lint
        run: python scripts/voice_lint.py
      - name: check_no_bom
        run: python scripts/check_no_bom.py
      - name: validate_schemas
        run: python scripts/validate_schemas.py
      - name: validate_registry
        run: python scripts/validate_registry.py
      - name: validate_decisions
        run: python scripts/validate_decisions.py
      - name: validate_roles
        run: python scripts/validate_roles.py
      - name: validate_tools
        run: python scripts/validate_tools.py
      - name: validate_policies
        run: python scripts/validate_policies.py
      - name: validate_skills
        run: python scripts/validate_skills.py
      - name: validate_dreams
        run: python scripts/validate_dreams.py
      - name: check_schema_cache_freshness
        run: python scripts/check_schema_cache_freshness.py
      - name: validate_run_evidence
        run: python scripts/validate_run_evidence.py

  node:
    name: node (lint + typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
      - name: install
        run: pnpm install --frozen-lockfile=false
      - name: lint
        run: pnpm lint
      - name: typecheck
        run: pnpm typecheck
      - name: test
        run: pnpm test
      - name: build
        run: pnpm build

  security:
    name: security (audit + gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
      - name: install
        run: pnpm install --frozen-lockfile=false
      - name: pnpm audit
        run: pnpm audit --audit-level high || true
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
