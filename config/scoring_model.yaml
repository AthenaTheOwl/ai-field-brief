# Scoring model for the AI Brief OS three-pass note system.
#
# Every source item that survives triage is scored against three axes
# (source_quality, profile_relevance, actionability) with penalties
# subtracted. The combined final_score gates whether the item lands in
# this week's brief, drops to the watchlist, or is archived.
#
# Scores are produced during Pass 3 (action extraction) and recorded
# alongside the action_candidates the matrix synthesis editor emits.
#
# Scale notes:
#   - Each axis is rated 1-5 (1 = weak, 5 = strong evidence).
#   - Each penalty is rated 0-5 (0 = none, 5 = severe).
#   - Aggregate axis scores are the unweighted mean of their components
#     unless a profile overrides component weights.
#
# Combination formula:
#   final_score = (0.40 * source_quality)
#               + (0.35 * profile_relevance)
#               + (0.25 * actionability)
#               - penalties_total
#
# where penalties_total is the sum of all penalty components (each 0-5).
# Maximum unpenalised final_score is 5.0 (all axes saturate at 5).
# After penalties, scores can go negative; that signals "archive".
#
# Thresholds below are calibrated to a 0-20 scale so the rubric reads
# naturally for human reviewers. To convert: multiply the raw weighted
# axis sum (max 5.0) by 4 before subtracting penalties. This matches
# the informal rubric already used in playbook/run-weekly-brief.md.

version: 1

scale:
  axis_min: 1
  axis_max: 5
  penalty_min: 0
  penalty_max: 5

axes:
  source_quality:
    weight: 0.40
    description: How strong is the source as evidence?
    components:
      - id: directness
        scale: [1, 5]
        notes: 5 = primary source (author, repo, paper). 1 = third-hand summary of summaries.
      - id: specificity
        scale: [1, 5]
        notes: 5 = concrete mechanism, code, numbers. 1 = vibes-level abstraction.
      - id: implementation_detail
        scale: [1, 5]
        notes: 5 = enough detail to reproduce or evaluate. 1 = no detail at all.
      - id: credibility
        scale: [1, 5]
        notes: 5 = track record, reproducible work, or first-party authority. 1 = anonymous, dubious, contradicted elsewhere.
      - id: caveat_quality
        scale: [1, 5]
        notes: 5 = source names its own limits clearly. 1 = source overclaims, no caveats surfaced.
      - id: originality
        scale: [1, 5]
        notes: 5 = new mechanism, new finding, new framing. 1 = restatement of widely known material.

  profile_relevance:
    weight: 0.35
    description: How relevant is this source to the active profile?
    components:
      - id: actionability
        scale: [1, 5]
        notes: 5 = the source suggests a concrete change the profile could make. 1 = nothing the profile could act on.
      - id: novelty_to_me
        scale: [1, 5]
        notes: 5 = this is new to the profile's worldview. 1 = the profile already knew this.
      - id: transferability
        scale: [1, 5]
        notes: 5 = the pattern transfers beyond the source's domain. 1 = stuck inside the source's context.
      - id: current_project_fit
        scale: [1, 5]
        notes: 5 = lands on an active project surface. 1 = no current project surface.
      - id: strategic_value
        scale: [1, 5]
        notes: 5 = changes a long-horizon bet or thesis. 1 = no strategic implication.
      - id: learning_value
        scale: [1, 5]
        notes: 5 = teaches something durable the profile wants to retain. 1 = teaches nothing durable.

  actionability:
    weight: 0.25
    description: How strong is the path from this source to a concrete action?
    notes: |
      Actionability is also a component of profile_relevance, but it is
      weighted separately here because the Brief OS gates promotion on
      action-readiness. Use the same 1-5 scale; this axis records the
      single best action candidate's strength.
    components:
      - id: action_strength
        scale: [1, 5]
        notes: 5 = ready-to-run action with test plan and success metric. 1 = no action candidate possible.

penalties:
  description: |
    Penalties are subtracted from the weighted axis sum after the sum
    is scaled to the 0-20 reading scale. Each penalty is 0-5.
  components:
    - id: hype_penalty
      scale: [0, 5]
      notes: 5 = pure hype, no mechanism. 0 = no hype detected.
    - id: duplicate_penalty
      scale: [0, 5]
      notes: 5 = exact restatement of a prior brief item. 0 = novel item.
    - id: source_staleness_penalty
      scale: [0, 5]
      notes: 5 = source predates the brief window by months and adds nothing new. 0 = fresh within the brief window.
    - id: weak_evidence_penalty
      scale: [0, 5]
      notes: 5 = claim with no supporting evidence the reviewer can verify. 0 = strong evidence chain.

formula:
  expression: "final_score = (0.40 * source_quality + 0.35 * profile_relevance + 0.25 * actionability) * 4 - penalties_total"
  notes: |
    The *4 scaling converts the weighted axis sum (max 5.0) into the
    0-20 reading scale used by the thresholds below. penalties_total
    is the unweighted sum of all penalty components (each 0-5), so
    penalties_total ranges 0-20. Final score can therefore range from
    -20 (catastrophic) to 20 (perfect).

thresholds:
  include_in_digest:
    min: 12
    notes: Items with final_score >= 12 are eligible for "Top signals" in the digest.
  watchlist:
    min: 9
    max: 11.999
    notes: Items in [9, 12) drop to the watchlist with a revisit trigger.
  archive:
    max: 8.999
    notes: Items below 9 are archived (kept searchable, not surfaced).

defaults:
  aggregation: mean
  profile_overrides_allowed: true
  notes: |
    Profiles MAY override component weights or thresholds. The default
    aggregation for an axis is the unweighted mean of its components.
    Overrides live in config/profiles.yaml under the profile's
    `scoring_overrides` key (optional).
