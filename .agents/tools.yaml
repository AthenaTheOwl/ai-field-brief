# .agents/tools.yaml
#
# The tool registry. Each entry matches the cross-repo tool.schema.json
# at https://athena.dev/ops/schemas/tool.schema.json. The policy engine
# cross-checks every tool call against this registry plus the calling
# role's allowed_tools list.
#
# allowed_roles uses the role ids from .agents/roles/<id>/role.yaml.
# A tool referenced by no role is dead code; spec_check does not catch
# this yet, but validate_tools will once the linkage rule lands.

- id: repo.read
  description: Read repository contents (files, directories, git history).
  category: repo
  risk_level: low
  allowed_roles:
    - control.coordinator
    - product.spec-writer
    - engineering.implementation
    - engineering.code-reviewer
    - science.proof-gate-runner
    - learning.dream-orchestrator
    - learning.skill-curator
    - security.threat-modeler
    - product.subscriber-experience
  requires_approval: false
  forbidden_paths: []
  emits_events:
    - tool.call.completed
  output_schema: https://athena.dev/ops/schemas/artifact.schema.json
  network_required: false

- id: repo.apply_patch
  description: Write or modify files in the repository.
  category: repo
  risk_level: medium
  allowed_roles:
    - engineering.implementation
    - product.spec-writer
    - learning.skill-curator
  requires_approval: false
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - production/**
  emits_events:
    - artifact.produced
    - tool.call.completed
  output_schema: https://athena.dev/ops/schemas/artifact.schema.json
  network_required: false

