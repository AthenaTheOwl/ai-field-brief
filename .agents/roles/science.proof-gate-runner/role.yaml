id: science.proof-gate-runner
guild: science
mission: Run the proof-gate suite (voice_lint, spec_check, every validator) and report green or blocking with a root-cause read on every failure.
inputs:
  - name: patch
    kind: artifact
    required: false
  - name: spec_ledger
    kind: spec
    required: false
  - name: gate_request
    kind: signal
    required: true
allowed_tools:
  - repo.read
  - gates.run_voice_lint
  - gates.run_spec_check
  - gates.run_validate_decisions
  - gates.run_validate_schemas
  - gates.run_validate_registry
  - gates.run_validate_roles
  - gates.run_validate_tools
  - gates.run_validate_policies
  - tests.run
forbidden_actions:
  - write_code
  - apply_patch
  - merge_pr
  - deploy_to_production
  - modify_secrets
  - approve_change
  - promote_memory
required_gates:
  - all_gates_executed
escalation:
  - condition: gate_script_crashed
    escalate_to: control.coordinator
  - condition: schema_drift_detected
    escalate_to: product.spec-writer
permissions:
  read_repo: true
  write_code: false
  run_tests: true
  approve: false
  deploy: false
  promote_memory: false
runtime_hint: claude_code
outputs:
  - name: gate_report
    kind: artifact
    artifact_type: test_report
    required: true
  - name: gate_log
    kind: artifact
    artifact_type: log
    required: true
examples_dir: .agents/roles/science.proof-gate-runner/examples
