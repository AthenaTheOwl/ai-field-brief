id: science.cell-verifier
guild: science
mission: Check every matrix cell against its source text and mark each cell passed, needs-patch, or failed.
inputs:
  - name: matrix_cells
    kind: artifact
    required: true
  - name: raw_sources
    kind: context
    required: true
allowed_tools:
  - repo.read
forbidden_actions:
  - rewrite_digest_thesis
  - invent_supporting_sources
  - write_code
  - deploy_to_production
  - modify_secrets
  - approve_change
  - promote_memory
required_gates:
  - no_invented_claims
  - no_flattened_uncertainty
  - caveats_preserved
escalation:
  - condition: source_body_missing
    escalate_to: control.coordinator
  - condition: cell_repeatedly_needs_patch
    escalate_to: science.lens-designer
permissions:
  read_repo: true
  write_code: false
  run_tests: false
  approve: false
  deploy: false
  promote_memory: false
runtime_hint: claude_code
outputs:
  - name: cell_faithfulness_report
    kind: artifact
    artifact_type: eval_report
    required: true
examples_dir: .agents/roles/science.cell-verifier/examples
