id: engineering.code-reviewer
guild: engineering
mission: Read every patch against its spec and DEC, block merges on quality or security smells, and grant or withhold review-only approval.
inputs:
  - name: patch
    kind: artifact
    required: true
  - name: spec_ledger
    kind: spec
    required: true
  - name: decision_record
    kind: artifact
    required: true
allowed_tools:
  - repo.read
  - tests.run
forbidden_actions:
  - write_code
  - apply_patch
  - merge_pr
  - deploy_to_production
  - modify_secrets
  - promote_memory
  - approve_own_work
required_gates:
  - review_checklist_complete
  - voice_lint
  - validate_decisions
escalation:
  - condition: security_smell_detected
    escalate_to: control.coordinator
  - condition: spec_drift_detected
    escalate_to: product.spec-writer
  - condition: scope_creep_detected
    escalate_to: control.coordinator
permissions:
  read_repo: true
  write_code: false
  run_tests: true
  approve: true
  deploy: false
  promote_memory: false
runtime_hint: claude_code
outputs:
  - name: review
    kind: artifact
    artifact_type: review
    required: true
examples_dir: .agents/roles/engineering.code-reviewer/examples
