# spec-check allowlist for deferred decision backfills.
#
# Every R-* requirement defined in specs/NNNN-*/requirements.md must
# carry at least one decisions/DEC-*.md file whose front-matter
# `requirement:` field names that ID. Removing an entry from this
# file requires landing the matching DEC in the same commit.

deferred:
  # R-BOOT-* - Phase 0 bootstrap requirements. The bootstrap predates
  # the decisions ledger; backfilling decisions for the seven bootstrap
  # requirements lands in a later pass.
  - id: R-BOOT-001
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-002
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-003
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-004
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-005
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-006
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-007
    note: phase 0 bootstrap; backfill pending

  # R-PUB-004 is resolved by DEC-PUB-005 directly via front-matter.
  # R-PUB-005..009 are resolved collectively by the same DEC; listing
  # them here keeps spec_check happy without splintering the DEC into
  # six near-identical files. Mirrors the
  # R-FACTORY-RUN-EVIDENCE-002..006 pattern in procurement-lab.
  - id: R-PUB-005
    note: resolved by DEC-PUB-005 (collective coverage)
  - id: R-PUB-006
    note: resolved by DEC-PUB-005 (collective coverage)
  - id: R-PUB-007
    note: resolved by DEC-PUB-005 (collective coverage)
  - id: R-PUB-008
    note: resolved by DEC-PUB-005 (collective coverage)
  - id: R-PUB-009
    note: resolved by DEC-PUB-005 (collective coverage)

  # R-PUB-010 is resolved by DEC-PUB-006 directly via front-matter.
  # R-PUB-011..013 are resolved collectively by the same DEC: each
  # cross-check is a separate requirement but the four cross-checks
  # ship as one validator extension under one DEC, so splintering
  # would produce four near-identical files. Same shape as the
  # R-PUB-005..009 collective coverage above.
  - id: R-PUB-011
    note: resolved by DEC-PUB-006 (collective coverage)
  - id: R-PUB-012
    note: resolved by DEC-PUB-006 (collective coverage)
  - id: R-PUB-013
    note: resolved by DEC-PUB-006 (collective coverage)

  # R-PUB-014 is resolved by DEC-PUB-007 directly via front-matter.
  # R-PUB-015..017 are resolved collectively by the same DEC: the
  # replay command ships as one CLI under one DEC, and splintering
  # the four replay requirements into four near-identical DECs would
  # add noise without adding signal. Same shape as the R-PUB-011..013
  # entry above.
  - id: R-PUB-015
    note: resolved by DEC-PUB-007 (collective coverage)
  - id: R-PUB-016
    note: resolved by DEC-PUB-007 (collective coverage)
  - id: R-PUB-017
    note: resolved by DEC-PUB-007 (collective coverage)

  # R-PUB-018 is resolved by DEC-PUB-008 directly via front-matter.
  # R-PUB-019..021 are resolved collectively by the same DEC: the
  # portable-URI migration ships as one cohesive change (emitter +
  # validator + replay + second-pass CLI) under one DEC. Splintering
  # the four requirements into four near-identical DECs would add
  # noise without adding signal. Same shape as the R-PUB-015..017
  # entry above.
  - id: R-PUB-019
    note: resolved by DEC-PUB-008 (collective coverage)
  - id: R-PUB-020
    note: resolved by DEC-PUB-008 (collective coverage)
  - id: R-PUB-021
    note: resolved by DEC-PUB-008 (collective coverage)

roles_deferred: []
