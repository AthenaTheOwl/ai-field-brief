# spec-check allowlist for deferred decision backfills.
#
# Every R-* requirement defined in specs/NNNN-*/requirements.md must
# carry at least one decisions/DEC-*.md file whose front-matter
# `requirement:` field names that ID. Removing an entry from this
# file requires landing the matching DEC in the same commit.

deferred:
  # R-BOOT-* - Phase 0 bootstrap requirements. The bootstrap predates
  # the decisions ledger; backfilling decisions for the seven bootstrap
  # requirements lands in a later pass.
  - id: R-BOOT-001
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-002
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-003
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-004
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-005
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-006
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-007
    note: phase 0 bootstrap; backfill pending

  # R-PUB-004 is resolved by DEC-PUB-005 directly via front-matter.
  # R-PUB-005..009 are resolved collectively by the same DEC; listing
  # them here keeps spec_check happy without splintering the DEC into
  # six near-identical files. Mirrors the
  # R-FACTORY-RUN-EVIDENCE-002..006 pattern in procurement-lab.
  - id: R-PUB-005
    note: resolved by DEC-PUB-005 (collective coverage)
  - id: R-PUB-006
    note: resolved by DEC-PUB-005 (collective coverage)
  - id: R-PUB-007
    note: resolved by DEC-PUB-005 (collective coverage)
  - id: R-PUB-008
    note: resolved by DEC-PUB-005 (collective coverage)
  - id: R-PUB-009
    note: resolved by DEC-PUB-005 (collective coverage)

