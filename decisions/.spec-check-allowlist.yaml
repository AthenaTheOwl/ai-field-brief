  # cross-check is a separate requirement but the four cross-checks
  # ship as one validator extension under one DEC, so splintering
  # would produce four near-identical files. Same shape as the
  # R-PUB-005..009 collective coverage above.
  - id: R-PUB-011
    note: resolved by DEC-PUB-006 (collective coverage)
  - id: R-PUB-012
    note: resolved by DEC-PUB-006 (collective coverage)
  - id: R-PUB-013
