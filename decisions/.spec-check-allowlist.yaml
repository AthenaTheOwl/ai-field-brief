# spec-check allowlist for deferred decision backfills.
#
# Every R-* requirement defined in specs/NNNN-*/requirements.md must
# carry at least one decisions/DEC-*.md file whose front-matter
# `requirement:` field names that ID. The R-* IDs listed below are
# deferred backfills: the requirements shipped before the CDCP
# scaffold landed; the matching DEC files land in a later pass.
#
# Format: a YAML list of R-* IDs under the `deferred` key.
# Each entry carries a short note for context.
#
# Removing an entry from this list requires landing the matching DEC
# in the same commit.

deferred:
  # R-BOOT-* — Phase 0 bootstrap requirements. The bootstrap predates
  # the decisions ledger; backfilling decisions for the seven bootstrap
  # requirements lands in a later pass after the first non-foundation
  # spec ships.
  - id: R-BOOT-001
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-002
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-003
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-004
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-005
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-006
    note: phase 0 bootstrap; backfill pending
  - id: R-BOOT-007
    note: phase 0 bootstrap; backfill pending

  # R-FND-* — Phase 1 foundation requirements. DEC-FND-001 and
  # DEC-FND-007 landed earlier. The remaining 12 (R-FND-002..006 and
  # R-FND-008..014) landed in the 2026-05-24 backfill commit; their
  # allowlist entries have been removed. roles_deferred entries stay
  # until traceability.md gets owner_role tokens.

  # R-SRC-* — Phase 2 source-registry requirements. The spec ledger
  # landed (specs/0002-source-registry/) ahead of the connector
  # implementation; DECs land alongside each connector that closes its
  # matching R-SRC-NNN. Removing an entry here requires shipping both
  # the connector and the DEC in the same commit.
  - id: R-SRC-001
    note: phase 2 source-type enum (18 types); connector + DEC pending
  - id: R-SRC-002
    note: per-source quality + cadence metadata; connector + DEC pending
  - id: R-SRC-003
    note: source-reliability auto-tuning; connector + DEC pending
  - id: R-SRC-004
    note: add-source URL + RSS validation; connector + DEC pending
  - id: R-SRC-005
    note: inbox-forward intake address; connector + DEC pending
  - id: R-SRC-006
    note: slack + discord emoji ingest; connector + DEC pending
  - id: R-SRC-007
    note: twitter list intake; connector + DEC pending
  - id: R-SRC-008
    note: github release notes intake; connector + DEC pending
  - id: R-SRC-009
    note: arxiv per-category feeds; connector + DEC pending
  - id: R-SRC-010
    note: hugging face daily papers; connector + DEC pending
  - id: R-SRC-011
    note: generic webhook intake with HMAC; connector + DEC pending
  - id: R-SRC-012
    note: source registry CRUD UI; UI + DEC pending
  - id: R-SRC-013
    note: source registry YAML import/export; connector + DEC pending
  - id: R-SRC-014
    note: source-quality dashboard; UI + DEC pending
  - id: R-SRC-015
    note: workspace area taxonomy; schema + DEC pending
  - id: R-SRC-016
    note: first-run seeded source registry; data + DEC pending

# roles_deferred lists R-* IDs that pre-date the spec 0011
# owner-role rule. Each entry waits on a traceability backfill that
# adds an `owner_role: <role-id>` token to the matching row. The
# operating-model gate skips these IDs for the owner-role check while
# the backfill is pending.
#
# R-CDCP-011..016 are deliberately absent; their traceability.md
# already names owner roles.

roles_deferred:
  # R-BOOT-006 keeps a deferred entry because its closest installed
  # owner role is engineering.implementation; the natural owner
  # (security.threat-modeler) sits in CATALOG.md and has not yet
  # graduated. The traceability row carries both the installed owner
  # and the pending-graduation marker.
  - id: R-BOOT-006
    note: owner_role mapped to engineering.implementation pending security.threat-modeler graduation

  # R-SRC-* — Phase 2 source-registry; owner_role backfill lands
  # alongside each connector.
  - id: R-SRC-001
    note: phase 2 source-registry; owner_role backfill pending
  - id: R-SRC-002
    note: phase 2 source-registry; owner_role backfill pending
  - id: R-SRC-003
    note: phase 2 source-registry; owner_role backfill pending
  - id: R-SRC-004
    note: phase 2 source-registry; owner_role backfill pending
  - id: R-SRC-005
    note: phase 2 source-registry; owner_role backfill pending
  - id: R-SRC-006
    note: phase 2 source-registry; owner_role backfill pending
  - id: R-SRC-007
    note: phase 2 source-registry; owner_role backfill pending
  - id: R-SRC-008
    note: phase 2 source-registry; owner_role backfill pending
  - id: R-SRC-009
    note: phase 2 source-registry; owner_role backfill pending
  - id: R-SRC-010
    note: phase 2 source-registry; owner_role backfill pending
  - id: R-SRC-011
    note: phase 2 source-registry; owner_role backfill pending
  - id: R-SRC-012
    note: phase 2 source-registry; owner_role backfill pending
  - id: R-SRC-013
    note: phase 2 source-registry; owner_role backfill pending
  - id: R-SRC-014
