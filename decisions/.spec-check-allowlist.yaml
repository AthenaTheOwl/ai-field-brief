  - id: R-SRC-007
    note: twitter list intake; connector + DEC pending
  - id: R-SRC-008
    note: github release notes intake; connector + DEC pending
  - id: R-SRC-009
    note: arxiv per-category feeds; connector + DEC pending
  - id: R-SRC-010
    note: hugging face daily papers; connector + DEC pending
  - id: R-SRC-011
    note: generic webhook intake with HMAC; connector + DEC pending
  - id: R-SRC-012
