    lens_id: mechanism_extraction
    mode: interpretive
    content: "Mechanism: depth of weight modification determines training robustness. Prompted (no weight change) is fragile; LoRA (low-rank weight change) is intermediate; FWFT (full weight change) is most robust to untargeted training pressure."
    source_refs:
      - uri: https://www.alignmentforum.org/posts/CmkAxJi83jRv9eXgJ/advice-for-making-robust-to-training-model-organisms-1
