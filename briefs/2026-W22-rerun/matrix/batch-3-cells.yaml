  - id: MTRX-W22-robust-model-organisms-reusable_pattern
    matrix_run_id: MTRX-W22-massive-rerun
    source_item_id: robust-model-organisms
    lens_id: reusable_pattern
    mode: interpretive
    content: "Pattern: when evaluating safety techniques, test subject robustness first; weak subjects produce uninterpretable results because you cannot distinguish technique strength from subject fragility."
    source_refs:
      - uri: https://www.alignmentforum.org/posts/CmkAxJi83jRv9eXgJ/advice-for-making-robust-to-training-model-organisms-1
        quote_or_span: "when a sophisticated technique succeeds on one, you can't tell whether the technique is good or the model organism is weak"
        ref_type: quote
    confidence: high
    faithfulness_status: passed
    status: verified
