      more than 15 percentage points relative to Opus 4.7.
    source_refs:
      - uri: https://simonwillison.net/2026/May/28/claude-opus-4-8/
        quote_or_span: "modest but tangible improvement"
        ref_type: quote
    confidence: high
    faithfulness_status: passed
    status: verified


