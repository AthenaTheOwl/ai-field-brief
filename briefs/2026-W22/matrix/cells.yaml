- id: MTRX-W22-copilot-cowork-sleight-bench-outbound-policy-systems_thinking
  matrix_run_id: MTRX-W22-massive-rerun
  source_item_id: copilot-cowork-exfil
  lens_id: systems_thinking
  mode: interpretive
  content: 'The system exposed is an asymmetric-information flow: any agent
    that composes outbound content sits at a confused-deputy boundary — it
    holds the user authority but reads attacker-controlled inputs. Image-load
    exfiltration is the textbook side channel for that boundary (external
    content → agent draft → URL render on recipient open → leak).
    SLEIGHT-Bench is the dual: a measurement instrument for whether a monitor
    catches the evasive transcripts that traverse the boundary. The pattern
    recurs at every confused-deputy surface — SSRF in image-fetch services,
    JSON-injection in webhook receivers, open-redirect-to-OAuth in identity
    providers.'
  source_refs:
  - uri: https://simonwillison.net/2026/May/26/copilot-cowork-exfiltrates-files/
    quote_or_span: attacker-supplied external images
    ref_type: quote
  - uri: https://alignment.anthropic.com/2026/sleight-bench/
    quote_or_span: benchmark of evasive transcripts
    ref_type: quote
  confidence: high
  faithfulness_status: passed
  status: verified
