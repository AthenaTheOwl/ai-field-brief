  lens_id: transferable_principle
  mode: synthetic
  content: 'Principle: when a substitute good moves from flat-rate to metered
    along a power-law distribution of demand, the budget primitive must be a
    cap-plus-alert, not an annual line item. Example beyond AI coding agents:
    cloud-data-warehouse spend (Snowflake, BigQuery) where a single
