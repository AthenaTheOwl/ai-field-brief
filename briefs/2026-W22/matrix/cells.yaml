- id: MTRX-W22-claude-code-cursor-vercel-policy-ladder-systems_thinking
  matrix_run_id: MTRX-W22-massive-rerun
  source_item_id: claude-code-2-1-154
  lens_id: systems_thinking
  mode: interpretive
  content: 'The system the three platforms ship is a graded authority lattice
    over agent actions, replacing the binary allow/prompt switch with four
    layered tiers (allowlist immediate / sandboxed isolated / classifier-routed
    / human prompt) plus a cost cap and an audit log. The mechanism mirrors
    how operating systems generalized from setuid binaries to capability-based
    permissions and from cron to scheduled, sandboxed, accountable tasks.
    The pattern recurs wherever a new actor class enters a permission model
    (mobile-app permissions in 2010, container-orchestration RBAC in 2017,
    OAuth scopes in 2012); agentic tool-calls in 2026 are the same shape one
