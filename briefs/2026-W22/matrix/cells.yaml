- id: MTRX-W22-hbm-shortage-nvidia-dc-veto-physical-constraint-systems_thinking
  matrix_run_id: MTRX-W22-massive-rerun
  source_item_id: memory-shortage
  lens_id: systems_thinking
  mode: interpretive
  content: 'The system exposed is physical-substrate binding: digital scaling
    hits a constraint that demand-side response cannot relieve within the
    capex cycle of the constrained resource. HBM allocation moving from ~2%
    to ~20% of wafer capacity is a fab-side bound; municipal water and power
    permits are a community-governance bound; the EO postponement plus
    state-level audit bills shift the active US AI-policy regime down a
    federal layer. The pattern recurs at every digital-to-physical
    transition: the institution that owns the binding physical resource
    becomes the binding decision-maker.'
