- id: MTRX-W22-glasswing-curl-sqlite-armin-systems_thinking
  matrix_run_id: MTRX-W22-massive-rerun
  source_item_id: anthropic-glasswing
  lens_id: systems_thinking
  mode: interpretive
  content: 'The system the four signals expose is a queue-imbalance: agent-assisted
    finding and drafting have compressed the cost of producing a vulnerability or
    bug report by an order of magnitude on each axis (Glasswing on discovery, the
    curl deluge on submission), while patch, triage, and CVE coordination scale
    linearly in maintainer-hours. SQLite and Armin Ronacher name the dual control
    surface: intake contracts that require verifiable artifacts (reproducer, raw
    observation, PoC) become the throttle when the upstream pipe is generative.
    The pattern recurs wherever a generative process feeds a verification process
    priced in human attention.'
  source_refs:
  - uri: https://www.anthropic.com/research/glasswing-initial-update
    quote_or_span: limited by how quickly we can verify, disclose, and patch
    ref_type: quote
  - uri: https://simonwillison.net/2026/May/26/the-pressure/
    quote_or_span: more than one AI-assisted security report per day
    ref_type: quote
  - uri: https://simonwillison.net/2026/May/27/sqlite-agents/
    quote_or_span: rejects agentic code patches
    ref_type: quote
  confidence: high
  faithfulness_status: passed
  status: verified
