  lens_id: transferable_principle
  mode: synthetic
  content: 'Principle: when an industry hits a physical constraint, the
    relevant governance surface moves to whoever issues the permit, owns the
    fab, or controls the substation — and the unit of planning shifts from
    capacity-count to throughput-per-physical-unit. Example beyond AI infra:
    EV-charger rollout where the binding constraint moved from charger-count
    to grid-interconnect approval, and the right planning metric became
    kilowatt-hours-per-stall-per-day rather than total stall count. The same
    shape applies to crypto-mining geography in 2018-2022, to commercial
    real-estate post-2020 where the binding constraint became municipal
    zoning rather than capital, and to undersea-cable buildouts.'
