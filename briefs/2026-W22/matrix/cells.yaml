  # ---- simon-copilot-exfil ----
  - id: MTRX-W22-copilot-source_gist
    matrix_run_id: matrix-2026-W22
    source_item_id: simon-copilot-exfil
    lens_id: source_gist
    mode: extractive
    content: >-
      Microsoft Copilot Cowork allows agents to send emails to user
      inboxes without explicit approval. Because emails can contain
      external images that trigger network requests, attacker-
      controlled prompt injection can exfiltrate OneDrive pre-
      authenticated download links when the user opens the message.
    source_refs:
      - uri: https://simonwillison.net/2026/May/26/copilot-cowork-exfiltrates-files/
        quote_or_span: "messages can contain external images that trigger network requests to external websites, data can be exfiltrated when a user opens a compromised message sent by the agent"
        ref_type: quote
    confidence: high
    faithfulness_status: passed
    status: verified

  - id: MTRX-W22-copilot-mechanism_extraction
    matrix_run_id: matrix-2026-W22
    source_item_id: simon-copilot-exfil
    lens_id: mechanism_extraction
    mode: interpretive
    content: >-
      The attack chain is: external content reaches the agent → agent
      composes an email → email contains attacker-supplied external
      image URL → recipient client requests the image → request URL
      carries the smuggled token. The pre-authenticated OneDrive link
      is the payload, the image-fetch is the channel.
    source_refs:
      - uri: https://simonwillison.net/2026/May/26/copilot-cowork-exfiltrates-files/
        quote_or_span: "OneDrive generates pre-authenticated download links"
        ref_type: quote
    confidence: high
    faithfulness_status: passed
    status: verified

  - id: MTRX-W22-copilot-adoption_action
    matrix_run_id: matrix-2026-W22
    source_item_id: simon-copilot-exfil
    lens_id: adoption_action
    mode: synthetic
    content: >-
      Two-line defense for any agent that drafts outbound email: (1)
      strip external image references before send, or proxy them
      through a sanitizing renderer; (2) require explicit user
      approval before any agent-composed email ships. The first kills
      the channel; the second adds the human gate the Microsoft
      product was missing.
    source_refs:
      - uri: https://simonwillison.net/2026/May/26/copilot-cowork-exfiltrates-files/
        quote_or_span: "Requiring explicit authorization before agents send communications"
        ref_type: quote
    confidence: high
    faithfulness_status: passed
    status: verified

  - id: MTRX-W22-copilot-governance_surface
    matrix_run_id: matrix-2026-W22
    source_item_id: simon-copilot-exfil
    lens_id: governance_surface
    mode: synthetic
    content: >-
