  lens_id: systems_thinking
  mode: interpretive
  content: 'The system exposed is execution-substrate migration: as cold-start
    latency on hosted sandboxes drops below the threshold where local feel
    breaks, the default execution substrate for a class of work shifts from
    the developer laptop to a managed environment. Conductor on Vercel
    Sandbox, Mistral Vibe cloud-side agents, and Cursor shared canvases are
    three independent instances of the same migration. The pattern recurs
    every time a substrate change unlocks fan-out (mainframes to PCs in the
    1980s, on-prem to cloud in the 2010s, containers to serverless in the
    late 2010s); the moving piece is which substrate has the lowest sustained
    latency for the dominant workload.'
