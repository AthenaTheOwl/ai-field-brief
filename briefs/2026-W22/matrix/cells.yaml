  - id: MTRX-W22-opus48-source_gist
    matrix_run_id: matrix-2026-W22
    source_item_id: anthropic-opus-4-8
    lens_id: source_gist
    mode: extractive
    content: >-
      Anthropic announced Claude Opus 4.8 on 2026-05-28 with stronger
      coding, agentic, and professional-work performance and an emphasis
      on consistency for long-running work.
    source_refs:
      - uri: https://www.anthropic.com/news/claude-opus-4-8
        quote_or_span: "stronger performance across coding, agentic tasks, and professional work"
        ref_type: quote
    confidence: high
    faithfulness_status: passed
    status: verified

  - id: MTRX-W22-opus48-claims_and_bets
    matrix_run_id: matrix-2026-W22
    source_item_id: anthropic-opus-4-8
    lens_id: claims_and_bets
    mode: interpretive
    content: >-
      Anthropic claims the Opus 4.8 release improves consistency across
      long-running agentic tasks. Simon Willison summarizes the model as
      "a modest but tangible improvement" with roughly 4x lower
      hallucination rate vs the prior Opus, achieved partly by the model
      abstaining on uncertain questions. The 4x figure is a vendor-stated
      number relayed through Simon, not independently verified this week.
    source_refs:
      - uri: https://simonwillison.net/2026/May/28/claude-opus-4-8/
        quote_or_span: "modest but tangible improvement; four times lower hallucination rate"
        ref_type: quote
    confidence: medium
    faithfulness_status: passed
    status: verified

  - id: MTRX-W22-opus48-mechanism_extraction
    matrix_run_id: matrix-2026-W22
    source_item_id: anthropic-opus-4-8
    lens_id: mechanism_extraction
    mode: interpretive
    content: >-
      The mechanism for the lower hallucination rate is abstention — the
      model declines to answer questions it judges uncertain rather than
      producing fluent guesses. The cost is more "I don't know" responses
      on the boundary, traded against fewer confident wrong answers.
    source_refs:
      - uri: https://simonwillison.net/2026/May/28/claude-opus-4-8/
        quote_or_span: "abstaining on uncertain questions"
        ref_type: quote
    confidence: medium
    faithfulness_status: passed
    status: verified

  - id: MTRX-W22-opus48-adoption_action
    matrix_run_id: matrix-2026-W22
    source_item_id: anthropic-opus-4-8
    lens_id: adoption_action
    mode: synthetic
    content: >-
      For teams running long sessions through Claude Code, the
      Opus 4.8 + xhigh-effort default + lean-system-prompt change in
      v2.1.154 are co-introduced; re-baseline eval suites against the
      new defaults before rolling forward in production. If your evals
      penalize abstention, expect the score to drift downward — adjust
      the rubric or accept the new ceiling.
    source_refs:
      - uri: https://github.com/anthropics/claude-code/releases/tag/v2.1.154
        quote_or_span: "Opus 4.8 release with high effort /effort xhigh as default for complex tasks; Lean system prompt now default"
        ref_type: quote
    confidence: medium
    faithfulness_status: passed
    status: verified

  - id: MTRX-W22-opus48-risk_and_caveats
    matrix_run_id: matrix-2026-W22
    source_item_id: anthropic-opus-4-8
    lens_id: risk_and_caveats
    mode: critique
    content: >-
      The 4x hallucination-reduction number is vendor-reported and
      relayed through a single secondary source. Independent evals will
      arrive over the next two weeks; Opus 4.7 remains the safer floor
      until those land. The change to xhigh-default also raises latency
      and per-turn token cost for teams that auto-route through Claude
      Code; budget headroom is the surfacing risk.
    source_refs:
      - uri: https://github.com/anthropics/claude-code/releases/tag/v2.1.154
        quote_or_span: "Fast mode on Opus 4.8 available at 2x standard rate for 2.5x speed"
        ref_type: quote
    confidence: medium
    faithfulness_status: passed
    status: verified

  - id: MTRX-W22-opus48-governance_surface
    matrix_run_id: matrix-2026-W22
    source_item_id: anthropic-opus-4-8
    lens_id: governance_surface
    mode: interpretive
    content: >-
      An abstention-tuned model changes the audit-log surface — refusal
      reasons replace some answers. If downstream consumers (ticket
      pipelines, RAG answer surfaces) treat refusal as failure, the
      metric shifts without the operator noticing. Add a refusal-rate
      panel to dashboards before promoting Opus 4.8 to the default.
    source_refs:
      - uri: https://simonwillison.net/2026/May/28/claude-opus-4-8/
        quote_or_span: "four times lower hallucination rates than its predecessor by abstaining"
        ref_type: quote
    confidence: medium
    faithfulness_status: passed
    status: verified

  - id: MTRX-W22-opus48-watchlist_trigger
    matrix_run_id: matrix-2026-W22
    source_item_id: anthropic-opus-4-8
    lens_id: watchlist_trigger
    mode: synthetic
    content: >-
      Revisit when an independent eval (LiveBench, AIDER, Aider Polyglot
      or vendor-neutral coding benchmark) publishes Opus 4.8 numbers, or
