- id: MTRX-W22-magenticlite-fara-model-not-agent-systems_thinking
  matrix_run_id: MTRX-W22-massive-rerun
  source_item_id: magenticlite-fara
  lens_id: systems_thinking
  mode: interpretive
  content: 'The system exposed is factor decomposition of long-horizon agent
    performance: past a reasoning capability threshold, the marginal return on
    additional model scale falls and the marginal return on the surrounding
    five factors (memory, retrieval, planning, tooling, feedback) rises.
    MagenticLite splits the agent across MagenticBrain (planner) and Fara1.5
    (browser executor) along exactly those factor lines; Co-Scientist applies
    role specialization to the research domain. The pattern recurs in every
    engineered system where a single dimension (compute, throughput, accuracy)
    saturates and the system must scale by composition (databases moving from
    single-node to distributed-with-coordinators in the 2010s; ML pipelines
    moving from monolithic models to ensemble + tooling in the late 2010s).'
