- id: MTRX-W24-disclosure-determinism-source_gist
  matrix_run_id: MTRX-W24-runtime-week
  source_item_id: w24-disclosure-determinism
  lens_id: source_gist
  mode: extractive
  content: AISI's RealityTest ran 3,152 identity-probing queries across 17 text and 6 speech models in five languages. Text disclosure ranged 8 to 92 percent; speech 10 to 57 percent. A single 'never say
    you are AI' instruction dropped disclosure to 3 to 27 percent. Anthropic's VirBench showed bare agents returning 106, 15, and 5 sequences for an identical query expecting 266; wrapping NCBI in a deterministic
    'gget virus' adapter pushed all agents above 90 percent and GPT-5.5 to 99.7 percent.
  source_refs:
  - uri: https://www.aisi.gov.uk/work/realitytest-do-ai-systems-disclose-their-identity-when-asked
    quote_or_span: UK AI Security Institute + Anthropic Research
    ref_type: link
  confidence: high
  faithfulness_status: passed
  status: verified
- id: MTRX-W24-disclosure-determinism-mechanism_extraction
  matrix_run_id: MTRX-W24-runtime-week
  source_item_id: w24-disclosure-determinism
  lens_id: mechanism_extraction
  mode: extractive
  content: Two failure modes with the same fix shape. Prompt-level promises (disclosure, retrieval correctness) collapse under variance; replace them with a deterministic layer between the model and the
    surface (a disclosure check at the response boundary, a deterministic adapter between the model and the messy API).
  source_refs:
  - uri: https://www.aisi.gov.uk/work/realitytest-do-ai-systems-disclose-their-identity-when-asked
    quote_or_span: UK AI Security Institute + Anthropic Research
