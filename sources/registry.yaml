    review_frequency: weekly
    intake: full
    quality:
      signal: high
      actionability: medium
      credibility: high
    status: active
    last_reviewed: 2026-05-22
    notes: >-
      Canonical for model releases, policy updates, and research-paper
      announcements. No official RSS; community feed at
      https://raw.githubusercontent.com/taobojlen/anthropic-rss-feed/main/anthropic_news_rss.xml.

